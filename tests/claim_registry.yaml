# YouRip Core Spine — Claim Coverage Registry
#
# Story: T1-S1-F-03 (initial registry); T1-S1-F-05 (alignment-to-patent-text, this change)
# Patent conformance: one entry per independent or dependent patent claim.
# Each entry maps a claim to the test(s) that exercise it.
#
# Format: YAML (simple subset — keys are strings, values are strings or lists).
# Parsed by src/claim-coverage/yaml-parse.ts (hand-rolled minimal YAML reader);
# loaded by src/claim-coverage/generate-report.ts.
#
# Status values:
#   implemented  — at least one test_claim_N_* test exists AND is expected to pass
#   placeholder  — claim not yet implemented; report renders red until the story lands
#   legacy       — reserved for tests that genuinely predate the test_claim_N_* convention; currently held by zero claims after T1-S1-F-04/F-05 reclassification. Future legacy entries must declare rename_target and rename_story; see tests/meta/claim-coverage.test.ts for the guard.
#
# Title convention:
#   Titles summarize the inventive substance of each claim using the claim's
#   own operative vocabulary. Titles are not paraphrases of dependency chains —
#   a dependent claim's title describes what the dependency adds, not what the
#   parent claim already covers.
#
# Adding or removing a claim entry requires a PR with PCO sign-off per T1-S1-G-02.

